<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemesanan Tiket</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Navbar */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.6);
  padding: 15px 30px;
  z-index: 1000;
  display: flex;
  justify-content: center;
  backdrop-filter: blur(6px);
}

.navbar ul {
  list-style: none;
  display: flex;
  gap: 25px;
}

.navbar ul li a {
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  font-family: "Poppins", sans-serif;
  transition: color 0.3s ease;
}

.navbar ul li a:hover {
  color: #ffcc66;
}

/* Body & Background */
body {
  background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1350&q=80") no-repeat center center fixed;
  background-size: cover;
  font-family: "Poppins", sans-serif;
  color: #333;
  padding: 100px 30px 30px; /* padding top lebih besar untuk navbar */
}

h1 {
  color: #fff;
  margin-bottom: 40px;
  text-align: center;
  font-size: 2.8em;
  font-weight: bold;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
}

/* Card Styling */
.card-wrapper {
  display: flex;
  flex-wrap: wrap;
  gap: 25px;
  max-width: 1100px;
  margin: 0 auto;
}

.card {
  flex: 1;
  min-width: 320px;
  background: rgba(255, 255, 255, 0.9);
  padding: 30px 25px;
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  backdrop-filter: blur(6px);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

.card h2 {
  color: #444;
  margin-bottom: 20px;
  font-size: 1.8em;
  border-left: 6px solid #ff7e5f;
  padding-left: 10px;
}

label {
  color: #444;
  margin-bottom: 8px;
  font-weight: 500;
  display: block;
}

input, select {
  padding: 12px 15px;
  margin-bottom: 18px;
  border: 1px solid #ccc;
  border-radius: 12px;
  background: #fff;
  outline: none;
  font-size: 1em;
  transition: all 0.3s ease;
  width: 100%;
}

input:focus, select:focus {
  border-color: #ff7e5f;
  box-shadow: 0 0 8px rgba(255,126,95,0.5);
}

button {
  padding: 12px 25px;
  background: linear-gradient(90deg, #ff7e5f, #feb47b);
  color: #ffffff;
  font-weight: bold;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 1em;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(255,126,95,0.4);
}

button:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 25px rgba(255,126,95,0.6);
  background: linear-gradient(90deg, #feb47b, #ff7e5f);
}

/* Responsive */
@media (max-width: 768px) {
  .card-wrapper {
    flex-direction: column;
  }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <ul>
    <li><a href="#beranda">Beranda</a></li>
    <li><a href="#pemesanan">Pemesanan</a></li>
    <li><a href="#kontak">Kontak</a></li>
  </ul>
</nav>

<!-- Beranda -->
<section id="beranda">
  <h1>Pemesanan Tiket</h1>
</section>

<!-- Pemesanan -->
<section id="pemesanan">
<div class="card-wrapper">
  <div class="card">
    <h2>Pemesanan</h2>
    <label>Nama Lengkap</label>
    <input id="nama" type="text" placeholder="Masukkan Nama Lengkap">
    <label>Email</label>
    <input id="email" type="email" placeholder="Masukkan Email">
    <label>Nomor Telepon</label>
    <input id="phone" type="tel" placeholder="Masukkan Nomor Telepon">
    <label>Destinasi</label>
    <select id="destinasi">
      <option value="">--Pilih Destinasi--</option>
      <option value="Bali" data-harga="1000000">Bali - Rp 1.000.000</option>
      <option value="Raja Ampat" data-harga="1500000">Raja Ampat - Rp 1.500.000</option>
      <option value="Danau Toba" data-harga="800000">Danau Toba - Rp 800.000</option>
      <option value="Lombok" data-harga="950000">Lombok - Rp 950.000</option>
      <option value="Yogyakarta" data-harga="700000">Yogyakarta - Rp 700.000</option>
      <option value="Bromo" data-harga="850000">Gunung Bromo - Rp 850.000</option>
      <option value="Labuan Bajo" data-harga="1600000">Labuan Bajo - Rp 1.600.000</option>
    </select>
    <label>Kewarganegaraan</label>
    <select id="kewarganegaraan">
      <option value="">--Pilih Kewarganegaraan--</option>
      <option value="WNI">Warga Negara Indonesia</option>
      <option value="WNA">Warga Negara Asing</option>
    </select>
  </div>

  <div class="card">
    <h2>Pembayaran</h2>
    <label>Tanggal Keberangkatan</label>
    <input id="tanggal" type="date">
    <label>Jumlah Tiket</label>
    <input id="tiket" type="number" min="1" value="1">
    <label>Metode Pembayaran</label>
    <select id="pembayaran">
      <option value="">--Pilih Metode--</option>
      <option value="Rekening BRI 04812671457">Rekening BRI 04812671457</option>
      <option value="E-Wallet Dana 08327164514">E-Wallet Dana 08327164514</option>
    </select>
    <label>Harga per Tiket</label>
    <input id="harga" type="text" disabled>
    <label>Total</label>
    <input id="total" type="text" disabled>
    <br><br>
    <button id="pesanBtn">Pesan Tiket</button>
  </div>
</div>
</section>

<!-- Kontak -->
<section id="kontak" style="margin-top:50px; text-align:center; color:#fff;">
  <h2>Kontak Kami</h2>
  <p>Hubungi kami melalui WhatsApp untuk informasi lebih lanjut.</p>
</section>

<script>
  const destinasi = document.getElementById('destinasi');
  const tiket = document.getElementById('tiket');
  const harga = document.getElementById('harga');
  const total = document.getElementById('total');

  function updateTotal(){
    const selected = destinasi.options[destinasi.selectedIndex];
    const price = parseInt(selected.dataset.harga) || 0;
    const qty = parseInt(tiket.value) || 0;
    if (price && qty) {
      total.value = 'Rp ' + (price * qty).toLocaleString('id');
    } else {
      total.value = '';
    }
  }
  
  destinasi.addEventListener('change', () => {
    const selected = destinasi.options[destinasi.selectedIndex];
    if (selected.dataset.harga) {
      harga.value = 'Rp ' + parseInt(selected.dataset.harga).toLocaleString('id'); 
    } else {
      harga.value = '';
    }
    updateTotal();
  });

  tiket.addEventListener('input', updateTotal);

  document.getElementById('pesanBtn').addEventListener('click', function() {
    const nama = document.getElementById('nama').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const destinasiText = destinasi.options[destinasi.selectedIndex].innerText;
    const tanggal = document.getElementById('tanggal').value;
    const qty = tiket.value;
    const pembayaran = document.getElementById('pembayaran').value;
    const price = harga.value;
    const totalPrice = total.value;

    if (!nama || !email || !phone || !destinasi.value || !tanggal || !qty || !pembayaran) {
      alert('Silakan lengkapi form terlebih dahulu');
      return;
    }
    const nomorWA = "6282269165383";
    const pesan = `Halo, saya ingin memesan tiket:\n- Nama: ${nama}\n- Email: ${email}\n- Telepon: ${phone}\n- Destinasi: ${destinasiText}\n- Tanggal: ${tanggal}\n- Jumlah Tiket: ${qty}\n- Metode Pembayaran: ${pembayaran}\n- Harga per Tiket: ${price}\n- Total: ${totalPrice}`;

    const url = `https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`;
    window.location.href = url;
  });
</script>

</body>
</html>
